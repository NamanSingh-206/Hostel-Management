<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Warden Login — HostelPro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root { --accent: #6c63ff; --accent2: #22d3b0; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      background: #0b0f1a;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: absolute;
      top: -120px; left: -120px;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(108,99,255,0.12), transparent 70%);
      pointer-events: none;
    }
    body::after {
      content: '';
      position: absolute;
      bottom: -120px; right: -120px;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(34,211,176,0.08), transparent 70%);
      pointer-events: none;
    }
    .login-wrap {
      width: 100%;
      max-width: 440px;
      padding: 20px;
      position: relative;
      z-index: 1;
    }
    .brand {
      text-align: center;
      margin-bottom: 28px;
    }
    .brand-icon {
      width: 68px; height: 68px;
      background: linear-gradient(135deg, #6c63ff, #22d3b0);
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px;
      margin: 0 auto 14px;
      box-shadow: 0 8px 32px rgba(108,99,255,0.35);
    }
    .brand h1 {
      font-family: 'Sora', sans-serif;
      font-size: 26px; font-weight: 700;
      color: #fff; margin-bottom: 4px;
    }
    .brand p { color: #64748b; font-size: 13px; }
    .login-card {
      background: #111827;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0,0,0,0.4);
    }
    .card-header-bar {
      background: linear-gradient(135deg, #1a1040, #0f2027);
      padding: 20px 28px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      display: flex; align-items: center; gap: 12px;
      position: relative;
    }
    .card-header-bar::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, #6c63ff, #22d3b0);
    }
    .header-icon {
      width: 42px; height: 42px;
      background: rgba(108,99,255,0.2);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .header-title {
      font-family: 'Sora', sans-serif;
      font-size: 16px; font-weight: 600; color: #fff;
    }
    .header-sub { font-size: 12px; color: #64748b; margin-top: 2px; }
    .card-body-area { padding: 28px 32px 32px; }
    .form-label {
      color: #94a3b8; font-size: 13px;
      font-weight: 500; margin-bottom: 6px; display: block;
    }
    .form-control {
      background: #1a2236 !important;
      border: 1px solid rgba(255,255,255,0.07) !important;
      border-radius: 10px !important;
      color: #e2e8f0 !important;
      padding: 11px 14px; font-size: 14px; width: 100%;
      transition: border-color 0.2s, box-shadow 0.2s;
      font-family: 'DM Sans', sans-serif;
    }
    .form-control:focus {
      outline: none;
      border-color: #6c63ff !important;
      box-shadow: 0 0 0 3px rgba(108,99,255,0.15) !important;
    }
    .form-control::placeholder { color: #475569; }
    .btn-login {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, #6c63ff, #22d3b0);
      border: none; border-radius: 10px; color: #fff;
      font-family: 'Sora', sans-serif;
      font-weight: 600; font-size: 15px;
      cursor: pointer; transition: opacity 0.2s, transform 0.15s;
      margin-top: 6px;
    }
    .btn-login:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-login:active { transform: translateY(0); }
    .alert {
      border-radius: 10px; border: none;
      font-size: 13px; padding: 10px 14px; margin-bottom: 18px;
    }
    .alert-danger  { background: rgba(239,68,68,0.15);  color: #ef4444; }
    .alert-info    { background: rgba(108,99,255,0.15); color: #a78bfa; }
    .alert-success { background: rgba(34,197,94,0.15);  color: #22c55e; }
    .switch-link {
      text-align: center; margin-top: 20px;
      font-size: 13px; color: #475569;
    }
    .switch-link a {
      color: #6c63ff; text-decoration: none; font-weight: 500;
    }
    .switch-link a:hover { color: #22d3b0; }
    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 20px 0; color: #334155; font-size: 12px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1;
      height: 1px; background: rgba(255,255,255,0.06);
    }
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="brand">
    <div class="brand-icon">🏛️</div>
    <h1>HostelPro</h1>
    <p>Hostel Management System</p>
  </div>

  <div class="login-card">
    <div class="card-header-bar">
      <div class="header-icon">🛡️</div>
      <div>
        <div class="header-title">Warden / Admin Login</div>
        <div class="header-sub">Access the management dashboard</div>
      </div>
    </div>

    <div class="card-body-area">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in messages %}
          <div class="alert alert-{{ cat }}">{{ msg }}</div>
        {% endfor %}
      {% endwith %}

      <form method="POST" action="{{ url_for('login') }}">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" name="username" class="form-control"
                 placeholder="e.g. admin" required autofocus>
        </div>
        <div class="mb-4">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control"
                 placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn-login">🛡️ Login as Warden</button>
      </form>

      <div class="divider">or</div>

      <div class="switch-link">
        Are you a student?
        <a href="{{ url_for('student_login') }}">Login here →</a>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
